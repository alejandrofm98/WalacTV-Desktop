name: Build and Release
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.2)'
        required: true
        type: string

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set.outputs.tag }}
    steps:
      - id: set
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

  windows:
    needs: resolve-tag
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Download mpv for bundling
        shell: bash
        run: scripts/fetch-mpv-windows.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://iptv.walerike.com' }}
        with:
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: WalacTV ${{ needs.resolve-tag.outputs.tag }}
          releaseBody: 'Build automatico para Windows y Linux.'
          includeDebug: false
          includeRelease: true

  linux:
    needs: [resolve-tag, windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://iptv.walerike.com' }}
        with:
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: WalacTV ${{ needs.resolve-tag.outputs.tag }}
          releaseBody: 'Build automatico para Windows y Linux.'
          includeDebug: false
          includeRelease: true
          args: --bundles appimage
